components:
  - name: {{ .COMPONENT_NAME }}/chart
    version: {{ .VERSION }}
    provider:
      name: The Platform Mesh Team
    resources:
      - name: chart
        type: helmChart
        relation: external
        version: {{ .VERSION }}
        access:
          type: ociArtifact
          imageReference: "{{ .CHART_OCI_PATH }}:{{ .VERSION }}"
    sources:
      - name: chart
        type: git
        version: {{ .VERSION }}
        access:
          commit: {{ .COMMIT }}
          repoUrl: {{ .CHART_REPO }}
          type: gitHub
  - name: {{ .COMPONENT_NAME }}/image
    version: {{ .APP_VERSION }}
    provider:
      name: The Platform Mesh Team
    resources:
      - name: image
        type: ociImage
        relation: external
        version: {{ .APP_VERSION }}
        access:
          type: ociArtifact
          imageReference: "{{ .IMAGE_NAME }}:{{ .APP_VERSION }}"
    sources:
      - name: source
        type: git
        version: {{ .APP_VERSION }}
        access:
          commit: {{ .IMAGE_REPO_SHA }}
          repoUrl: {{ .IMAGE_REPO }}
          type: gitHub
  - name: {{ .COMPONENT_NAME }}
    version: {{ .VERSION }}
    provider:
      name: The Platform Mesh Team
    componentReferences:
      - name: chart
        componentName: {{ .COMPONENT_NAME }}/chart
        version: {{ .VERSION }}
      - name: image
        componentName: {{ .COMPONENT_NAME }}/image
        version: {{ .APP_VERSION }}
