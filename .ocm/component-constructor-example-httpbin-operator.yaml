components:
  - name: {{ .COMPONENT_NAME }}
    version: {{ .VERSION }}
    provider:
      name: The Platform Mesh Team
    componentReferences:
      - name: chart
        componentName: github.com/platform-mesh/helm-charts/{{ .COMPONENT_SHORT_NAME }}
        version: {{ .VERSION }}
      - name: image
        componentName: github.com/platform-mesh/images/{{ .COMPONENT_SHORT_NAME }}
        version: {{ .APP_VERSION }}
      - name: api-syncagent
        componentName: github.com/kcp-dev/api-syncagent
        version: "0.4.4"
      - name: ingress-nginx
        componentName: github.com/kubernetes/ingress-nginx
        version: "4.11.3"
    sources:
      - name: chart
        type: git
        version: {{ .VERSION }}
        access:
          commit: {{ .COMMIT }}
          repoUrl: {{ .CHART_REPO }}
          type: gitHub

  - name: github.com/platform-mesh/helm-charts/{{ .COMPONENT_SHORT_NAME }}
    version: {{ .VERSION }}
    provider:
      name: The Platform Mesh Team
    resources:
      - name: chart
        type: helmChart
        relation: external
        version: {{ .VERSION }}
        access:
          type: ociArtifact
          imageReference: "{{ .CHART_OCI_PATH }}:{{ .VERSION }}"

  - name: github.com/platform-mesh/images/{{ .COMPONENT_SHORT_NAME }}
    version: {{ .APP_VERSION }}
    provider:
      name: The Platform Mesh Team
    resources:
      - name: image
        type: ociImage
        relation: external
        version: {{ .APP_VERSION }}
        access:
          type: ociArtifact
          imageReference: "{{ .IMAGE_NAME }}:{{ .APP_VERSION }}"
    sources:
      - name: source
        type: git
        version: {{ .APP_VERSION }}
        access:
          commit: {{ .IMAGE_REPO_SHA }}
          repoUrl: {{ .IMAGE_REPO }}
          type: gitHub
