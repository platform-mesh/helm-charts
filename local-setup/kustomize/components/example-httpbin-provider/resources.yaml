apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  labels:
    artifact: chart
    repo: oci
  name: example-httpbin-provider-chart
  namespace: default
spec:
  componentRef:
    name: platform-mesh
  ocmConfig:
  - apiVersion: delivery.ocm.software/v1alpha1
    kind: Repository
    name: platform-mesh
    namespace: default
    policy: Propagate
  resource:
    byReference:
      referencePath:
      - name: example-httpbin-operator
      - name: chart
      resource:
        name: chart
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  labels:
    artifact: image
    for: example-httpbin-provider
  name: example-httpbin-provider-image
  namespace: default
spec:
  componentRef:
    name: platform-mesh
  ocmConfig:
  - apiVersion: delivery.ocm.software/v1alpha1
    kind: Repository
    name: platform-mesh
    namespace: default
    policy: Propagate
  resource:
    byReference:
      referencePath:
      - name: example-httpbin-operator
      - name: image
      resource:
        name: image
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  labels:
    artifact: chart
    repo: helm
  name: api-syncagent
  namespace: default
spec:
  componentRef:
    name: platform-mesh
  ocmConfig:
  - apiVersion: delivery.ocm.software/v1alpha1
    kind: Repository
    name: platform-mesh
    namespace: default
    policy: Propagate
  resource:
    byReference:
      referencePath:
      - name: example-httpbin-operator
      - name: api-syncagent
      resource:
        name: chart
