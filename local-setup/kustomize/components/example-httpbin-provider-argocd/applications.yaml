# ArgoCD Applications for the example-httpbin-provider demo in remote+argocd mode.
# These live on the infra cluster (argocd namespace) and target the registered
# runtime cluster `platform-mesh-cluster`.  Chart sources are hardcoded here; we
# do not rely on OCM Resources to back-fill them as we do for in-profile
# services.  Versions track what the platform-mesh OCM component currently
# resolves to.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-syncagent
  namespace: argocd
spec:
  destination:
    namespace: example-httpbin-provider
    name: platform-mesh-cluster
  project: default
  source:
    chart: api-syncagent
    repoURL: https://kcp-dev.github.io/helm-charts
    targetRevision: "0.4.4"
    helm:
      values: |
        apiExportName: orchestrate.platform-mesh.io
        agentName: kcp-api-syncagent
        kcpKubeconfig: httpbin-kubeconfig
        hostAliases:
          enabled: true
          values:
            - ip: "${RUNTIME_CLUSTER_IP}"
              hostnames:
              - "localhost"
              - "portal.localhost"
              - "kcp.localhost"
              - "root.kcp.localhost"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-httpbin-provider
  namespace: argocd
spec:
  destination:
    namespace: example-httpbin-provider
    name: platform-mesh-cluster
  project: default
  source:
    chart: example-httpbin-operator
    repoURL: ghcr.io/platform-mesh/helm-charts
    targetRevision: "0.5.17"
    helm:
      values: |
        operator:
          args:
            - --local-http-route
            - --local-http-route-port=8443
            - --local-http-route-gateway-name=k8sapi-gateway
            - --local-http-route-gateway-namespace=platform-mesh-system
            - --domain=httpbin.services.portal.localhost
        apiSyncagent:
          rbac:
            enable: true
          publishedResources:
            enable: true
          serviceAccount:
            name: api-syncagent
            namespace: example-httpbin-provider
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
