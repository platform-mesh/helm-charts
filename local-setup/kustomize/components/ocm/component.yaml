apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: platform-mesh
spec:
  repositoryRef:
    name: platform-mesh
  component: github.com/platform-mesh/platform-mesh
  semver: PLACEHOLDER # Replace with PLATFORM_MESH_VERSION when set
  interval: 1m
  verify:
    - signature: ocm.platform-mesh
      secretRef:
        name: ocm-signing-public-cert
  ocmConfig:
    - kind: Repository
      apiVersion: delivery.ocm.software/v1alpha1
      name: platform-mesh
      namespace: platform-mesh-system
