apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: platform-mesh
spec:
  repositoryRef:
    name: platform-mesh
  component: github.com/platform-mesh/platform-mesh
  semver: 0.4.0-build.78
  interval: 1m
  verify:
    - signature: platform-mesh
      secretRef:
        name: ocm-signing-public-cert
  ocmConfig:
    - kind: Repository
      apiVersion: delivery.ocm.software/v1alpha1
      name: platform-mesh
      namespace: default
