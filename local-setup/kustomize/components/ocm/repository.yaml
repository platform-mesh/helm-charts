apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: platform-mesh
spec:
  repositorySpec:
    baseUrl: ghcr.io/platform-mesh
    type: OCIRegistry
  interval: 1m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: gardener-releases
  namespace: platform-mesh-system
spec:
  interval: 1m0s
  ocmConfig:
  - apiVersion: v1
    kind: ConfigMap
    name: ocm-resolver-config
    namespace: platform-mesh-system
    policy: Propagate
  repositorySpec:
    baseUrl: europe-docker.pkg.dev/gardener-project/releases
    type: OCIRegistry
