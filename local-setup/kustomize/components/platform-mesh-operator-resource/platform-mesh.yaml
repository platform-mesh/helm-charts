apiVersion: core.platform-mesh.io/v1alpha1
kind: PlatformMesh
metadata:
  name: platform-mesh
  namespace: platform-mesh-system
spec:
  exposure:
    port: 8443
    baseDomain: "portal.localhost"
  ocm:
    repo:
      name: platform-mesh
    component:
      name: platform-mesh
    referencePath: []
  featureToggles:
  - name: feature-enable-getting-started
  - name: feature-disable-email-verification
  - name: feature-accounts-in-accounts
  # kcp:
  #   providerConnections:
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    security-operator-kubeconfig
  #   - adminAuth: true
  #     path:      root
  #     secret:    security-terminator-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    init-agent-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    kubernetes-grapqhl-gateway-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    account-operator-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    rebac-authz-webhook-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    extension-manager-operator-kubeconfig
  #   - adminAuth: true
  #     path:      root:platform-mesh-system
  #     secret:    iam-service-kubeconfig
  #   - adminAuth: true
  #     path:      root
  #     secret:    security-initializer-kubeconfig
  #   - adminAuth: true
  #     path:      root:orgs
  #     rawPath:   "/services/contentconfigurations"
  #     secret:    portal-kubeconfig
  values:
    account-operator:
      values:
        hostAliases:
          enabled: true
        log:
          noJson: true
    keycloak:
      enabled: false
    infra:
      imageResources: [] # Disable kcp-image OCM Resource to allow custom kcp.image.tag
      values:
        keycloak:
          service:
            name: keycloak-service
            port: 8080
          keycloakConfig:
            url: http://keycloak-service.platform-mesh-system.svc.cluster.local:8080/keycloak
        kcp:
          auth:
            serviceAccount:
              enabled: true
          image:
            tag: "097afc12c" # bump kcp image to work around WatchList issues
          shards: []
          frontProxy:
            clusterIP: "10.96.0.100"
        traefik:
          accessControlAllowOriginList:
          - "http://localhost:4200"
          - "http://localhost:4300"
          - "http://*.localhost:4200"
          - "http://*.localhost:4300"
          - "http://sub.localhost:4300"
          - "https://portal.localhost:8443"
          - "https://*.portal.localhost:8443"
        cors:
          enabled: true
        hostAliases:
          enabled: true
    security-operator:
      values:
        log:
          noJson: true
        system:
          extraArgs:
          - --idp-smtp-server=mailpit.platform-mesh-system.svc.cluster.local
          - --idp-smtp-port=1025
          - --idp-from-address=keycloak@portal.localhost
          - --set-default-password
          - --idp-registration-allowed
        fga:
          extraArgs:
            - --idp-smtp-server=mailpit.platform-mesh-system.svc.cluster.local
            - --idp-smtp-port=1025
            - --idp-from-address=keycloak@portal.localhost
            - --set-default-password
            - --idp-registration-allowed
            - --domain-ca-lookup
            - --development-allow-unverified-emails
            - --idp-additional-redirect-urls=http://localhost:8000/callback*,http://localhost:4300/callback*,http://sub.localhost:4300/callback*
        initializer:
          extraArgs:
          - --domain-ca-lookup
          - --idp-registration-allowed
          - --development-allow-unverified-emails
          - --idp-additional-redirect-urls=http://localhost:8000/callback*,http://localhost:4300/callback*,http://sub.localhost:4300/callback*
        caSecret: domain-certificate-ca
        hostAliases:
          enabled: true
    portal:
      enabled: true
      values:
        kcp:
          url: "https://localhost:8443"
        extraEnvVars:
        - name: OPENMFP_PORTAL_CONTEXT_IAM_SERVICE_API_URL
          value: https://${org-subdomain}{{ .Values.baseDomainPort }}/iam/graphql
        - name: OPENMFP_PORTAL_CONTEXT_CRD_GATEWAY_API_URL
          value: "https://${org-subdomain}{{ .Values.baseDomainPort }}/gateway/api/clusters/root:orgs:${org-name}/graphql"
        - name: NODE_EXTRA_CA_CERTS
          value: /etc/ssl/certs/domain-ca.crt
        extraVolumes:
        - name: domain-ca
          secret:
            secretName: domain-certificate-ca
        extraVolumeMounts:
        - name: domain-ca
          mountPath: /etc/ssl/certs/domain-ca.crt
          subPath: tls.crt
          readOnly: true
        hostAliases:
          enabled: true
          entries:
          - ip: "10.96.188.4"
            hostnames:
            - "localhost"
            - "portal.localhost"
            - "kcp.localhost"
            - "root.kcp.localhost"
            - "nereus.kcp.localhost"
            - "triton.kcp.localhost"
    openfga:
      enabled: true
      values:
        datastore:
          uri: "postgres://openfga:openfga-password@platform-mesh-pg-rw.platform-mesh-system.svc.cluster.local:5432/openfga?sslmode=disable"
        extraEnvVars:
          - name: OPENFGA_DATASTORE_SECONDARY_URI
            value: "postgres://openfga:openfga-password@platform-mesh-pg-ro.platform-mesh-system.svc.cluster.local:5432/openfga?sslmode=disable"
        postgresql:
          enabled: false
    marketplace-ui:
      enabled: false
    terminal-controller-manager:
      enabled: false
    rebac-authz-webhook:
      values:
        hostAliases:
          enabled: true
    iam-service:
      values:
        extraArgs:
        - --no-json
        cors:
          enabled: true
        hostAliases:
          enabled: true
    init-agent:
      values:
        hostAliases:
          enabled: true
    extension-manager-operator:
      values:
        hostAliases:
          enabled: true
    kubernetes-graphql-gateway:
      values:
        hostAliases:
          enabled: true
        listener:
          anchorResource: 'object.metadata.name.contains("platform-mesh.io")'
        trust:
          default:
            jwksUrl: http://keycloak-service.platform-mesh-system:8080/keycloak/realms/default/protocol/openid-connect/certs
    kcp-operator:
      external: true
    kcp:
      external: true