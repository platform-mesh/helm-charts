apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CRDs are sourced directly from the platform-mesh-operator-crds chart so that
# local-setup stays in sync with the canonical definitions used by the operator
# Helm chart on the infra cluster.
resources:
  - ../../../../charts/platform-mesh-operator-crds/templates/core.platform-mesh.io_platformmeshes.yaml
  - ../../../../charts/platform-mesh-operator-crds/templates/providers.platform-mesh.io_managedproviders.yaml
