apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: platform-mesh-operator
spec:
  schema:
    apiVersion: v1alpha1
    kind: PlatformMeshOperator
    spec:
      imageReferencePath: "[]map[string]string | required=false"
      chartReferencePath: "[]map[string]string | required=false"
      remoteRuntimeEnabled: "string | required=false"
      remoteRuntimeSecretName: "string | required=false"
      remoteRuntimeSecretKey: "string | required=false"
      kcpUrl: "string | required=false"
      runtimeClusterIp: "string | required=false"
  resources:
  - id: resourceChart
    readyWhen:
    - ${has(resourceChart.status.resource)}
    - ${resourceChart.status.conditions.exists(x, x.type == 'Ready' && x.status == "True")}
    template:
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: platform-mesh-operator-chart
        labels:
          artifact: oci
      spec:
        componentRef:
          name: platform-mesh
        ocmConfig:
        - apiVersion: delivery.ocm.software/v1alpha1
          kind: Repository
          name: platform-mesh
          namespace: platform-mesh-system
          policy: Propagate
        resource:
          byReference:
            referencePath: ${schema.spec.chartReferencePath}
            resource:
              name: chart
        additionalStatusFields:
          registry: resource.access.imageReference.toOCI().registry
          repository: resource.access.imageReference.toOCI().repository
          version: resource.version
  - id: resourceImage
    readyWhen:
    - ${has(resourceImage.status.resource)}
    - ${resourceImage.status.conditions.exists(x, x.type == 'Ready' && x.status == "True")}
    template:
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: platform-mesh-operator-image
        labels:
          artifact: image
      spec:
        componentRef:
          name: platform-mesh
        ocmConfig:
        - apiVersion: delivery.ocm.software/v1alpha1
          kind: Repository
          name: platform-mesh
          namespace: platform-mesh-system
          policy: Propagate
        resource:
          byReference:
            referencePath: ${schema.spec.imageReferencePath}
            resource:
              name: image
        additionalStatusFields:
          registry: resource.access.imageReference.toOCI().registry
          repository: resource.access.imageReference.toOCI().repository
          version: resource.version
  - id: ocirepository
    readyWhen:
    - ${has(ocirepository.status.artifact)}
    - ${ocirepository.status.conditions.exists(x, x.type == 'Ready' && x.status == "True")}
    template:
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: platform-mesh-operator
      spec:
        interval: 1m0s
        insecure: true
        layerSelector:
          mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
          operation: copy
        url: oci://${resourceChart.status.additional.?registry}/${resourceChart.status.additional.?repository}
        ref:
          tag: ${resourceChart.status.additional.?version}
  - id: helmrelease
    readyWhen:
    - ${helmrelease.status.conditions.exists(x, x.type == 'Ready' && x.status == "True")}
    template:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: platform-mesh-operator
      spec:
        releaseName: platform-mesh-operator
        targetNamespace: platform-mesh-system
        interval: 1m
        timeout: 5m
        chartRef:
          kind: OCIRepository
          name: ${ocirepository.metadata.name}
          namespace: platform-mesh-system
        values:
          log:
            noJson: true
          image:
            tag: ${resourceImage.status.?resource.?version}
          idp:
            registrationAllowed: true
            values:
          extraArgs:
          - --kcp-front-proxy-port=8443
          - '--kcp-url=${has(schema.spec.kcpUrl) && schema.spec.kcpUrl != "" ? schema.spec.kcpUrl : "https://frontproxy-front-proxy.platform-mesh-system:8443"}'
          - --subroutines-feature-toggles-enabled=true
          - --no-json=true
          # Remote-runtime args, gated on schema.spec.remoteRuntimeEnabled. The "false" branch
          # repeats --no-json=true (already passed above) as a no-op filler because KRO/CEL
          # cannot conditionally omit a list element — it must produce a string. --no-json=true
          # is idempotent on the operator side, so duplicating it is safe but admittedly ugly.
          # If/when KRO supports conditional list elements, collapse these into a single
          # remote-runtime block.
          - '${has(schema.spec.remoteRuntimeEnabled) && schema.spec.remoteRuntimeEnabled == "true" ? "--remote-runtime-kubeconfig=/etc/platformmesh/kubeconfig" : "--no-json=true"}'
          - '${has(schema.spec.remoteRuntimeEnabled) && schema.spec.remoteRuntimeEnabled == "true" ? "--remote-runtime-infra-secret-name=" + (has(schema.spec.remoteRuntimeSecretName) && schema.spec.remoteRuntimeSecretName != "" ? schema.spec.remoteRuntimeSecretName : "platform-mesh-kubeconfig") : "--no-json=true"}'
          - '${has(schema.spec.remoteRuntimeEnabled) && schema.spec.remoteRuntimeEnabled == "true" ? "--remote-runtime-infra-secret-key=" + (has(schema.spec.remoteRuntimeSecretKey) && schema.spec.remoteRuntimeSecretKey != "" ? schema.spec.remoteRuntimeSecretKey : "kubeconfig") : "--no-json=true"}'
          extraVolumes:
          - name: external-platformmesh-deployment
            secret:
              secretName: '${has(schema.spec.remoteRuntimeSecretName) && schema.spec.remoteRuntimeSecretName != "" ? schema.spec.remoteRuntimeSecretName : "platform-mesh-kubeconfig"}'
              optional: true
              defaultMode: 420
          extraVolumeMounts:
          - name: external-platformmesh-deployment
            mountPath: /etc/platformmesh
            readOnly: true
          hostAliases:
            enabled: '${has(schema.spec.runtimeClusterIp) && schema.spec.runtimeClusterIp != ""}'
            entries:
            - ip: '${has(schema.spec.runtimeClusterIp) ? schema.spec.runtimeClusterIp : ""}'
              hostnames:
              - portal.localhost
              - localhost
              - root.kcp.localhost
