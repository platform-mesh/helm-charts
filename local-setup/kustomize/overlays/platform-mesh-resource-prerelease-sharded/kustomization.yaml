apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../platform-mesh-resource-prerelease
patches:
  - target:
      kind: PlatformMesh
      name: platform-mesh
      namespace: platform-mesh-system
    patch: |-
      - op: add
        path: /spec/values
        value:
          services:
            infra:
              values:
                kcp:
                  image:
                    tag: "15923aca7"
                  external:
                    hostname: kcp.api.portal.localhost
                  shards:
                    - name: nereus
                      hostname: nereus.kcp.localhost
                    - name: triton
                      hostname: triton.kcp.localhost
