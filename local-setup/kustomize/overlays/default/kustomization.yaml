apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../components/platform-mesh-operator
  - ../../components/ocm

patches:
  - target:
      kind: Secret
      name: ocm-signing-public-cert
    patch: |
      - op: add
        path: /metadata/namespace
        value: platform-mesh-system