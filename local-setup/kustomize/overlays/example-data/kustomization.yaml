apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../components/platform-mesh-operator-resource
  - ../../components/example-httpbin-provider

patches:
  - target:
      kind: PlatformMesh
      name: platform-mesh
      namespace: platform-mesh-system
    patch: |-
      apiVersion: your.api.version
      kind: PlatformMesh
      metadata:
        name: platform-mesh
        namespace: platform-mesh-system
      spec:
        kcp:
          extraProviderConnections:
            - endpointSliceName: ""
              path: root:providers:httpbin-provider
              secret: httpbin-kubeconfig
              namespace: example-httpbin-provider
              external: false
              # OCM-shipped CRD (e.g. 0.3.0-build.*) still uses useAdminKubeconfig; adminAuth is rejected until the bundle includes the renamed field.
              adminAuth: true
          extraDefaultAPIBindings:
            - workspaceTypePath: root:account
              export: orchestrate.platform-mesh.io
              path: root:providers:httpbin-provider