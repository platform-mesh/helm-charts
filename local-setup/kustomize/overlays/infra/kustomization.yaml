apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources.yaml
  - ../../components/ocm

patches:
  - target:
      kind: Component
      name: platform-mesh
    patch: |
      - op: add
        path: /metadata/namespace
        value: platform-mesh-system
      - op: replace
        path: /spec/ocmConfig/0/namespace
        value: platform-mesh-system
  - target:
      kind: Repository
      name: platform-mesh
    patch: |
      - op: add
        path: /metadata/namespace
        value: platform-mesh-system
  - target:
      kind: Secret
      name: ocm-signing-public-cert
    patch: |
      - op: add
        path: /metadata/namespace
        value: platform-mesh-system
