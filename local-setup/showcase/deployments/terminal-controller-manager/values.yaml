image:
  name: ghcr.io/platform-mesh/terminal-controller-manager
  tag: v0.2.0

log:
  noJson: true
  level: debug

terminal:
  image:
    name: ghcr.io/platform-mesh/terminal
    tag: v0.2.0
  namespace: terminal-sessions
  lifetime: 2h
  # Host alias for local development to resolve portal.localhost
  hostAliasIP: "10.96.188.4"
  # The terminal pod only needs localhost
  hostAliasNames:
    - "localhost"

hostAliases:
  enabled: true
  entries:
    - ip: "10.96.188.4"
      hostnames:
        - "localhost"
        - "portal.localhost"

kcp:
  apiExportEndpointSliceName: core.platform-mesh.io
  kubeconfigSecret: "terminal-controller-manager-kubeconfig"

gateway:
  name: k8sapi-gateway
  namespace: platform-mesh-system
  hostnames:
    - "portal.localhost"
    - "*.portal.localhost"
