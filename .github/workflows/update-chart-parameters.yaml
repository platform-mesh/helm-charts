name: Update chart parameters

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'The name of the helm chart'
        required: true
        default: ''
      appVersion:
        description: 'The version tag of the docker image'
        required: true
        default: '0.0.0'

permissions:
  contents: read

jobs:
  version-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: "1415820"
          private-key: ${{ secrets.PM_PUBLISHER_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup yq@latest
        run: |
          if ! command -v yq &>/dev/null
          then
            mkdir -p /home/runner/.local/bin
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /home/runner/.local/bin/yq &&\
              chmod +x /home/runner/.local/bin/yq
          fi
      - name: Configure GIT
        run: |
          git config --global user.name "Platform Mesh Publisher"
          git config --global user.email "platformmesh@gmail.com"
      - name: Validate inputs
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          if ! [[ "${INPUT_CHART}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid chart name"
            exit 1
          fi
          if ! [[ "${INPUT_APP_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid appVersion format"
            exit 1
          fi
      - name: Update appVersion in Chart.yaml
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          chart_file="charts/${INPUT_CHART}/Chart.yaml"
          ls -al charts/
          if [ -f "$chart_file" ]; then
            echo "Chart.yaml file found at $chart_file"
            yq e -i ".appVersion = \"${INPUT_APP_VERSION}\"" "$chart_file"
            echo "Updated appVersion to ${INPUT_APP_VERSION} in $chart_file"

            # bump version parameter in chart
            CHART_VERSION=$(yq '.version' "$chart_file")
            IFS='.' read -r -a VERSION_PARTS <<< "$CHART_VERSION"
            MAJOR=${VERSION_PARTS[0]}
            MINOR=${VERSION_PARTS[1]}
            PATCH=${VERSION_PARTS[2]}
            NEW_PATCH=$((PATCH + 1))
            NEW_CHART_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
            yq e -i ".version = \"$NEW_CHART_VERSION\"" "$chart_file"
            echo "Version bumped to $NEW_CHART_VERSION in $chart_file"

            git add "$chart_file"
            git commit -m "Set $NEW_CHART_VERSION / ${INPUT_APP_VERSION} in $chart_file" || echo "appVersion was already up to date"
          else
            echo "Chart.yaml file not found at $chart_file"
            exit 1
          fi
      - name: Git push
        run: |
          git push origin main
          echo "Pushed changes to main"
          git show HEAD


