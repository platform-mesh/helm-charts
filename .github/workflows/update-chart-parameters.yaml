name: Update chart parameters

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'The name of the helm chart'
        required: true
        default: ''
      appVersion:
        description: 'The version tag of the docker image'
        required: true
        default: '0.0.0'

permissions:
  contents: read

jobs:
  version-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "1415820"
          private-key: ${{ secrets.PM_PUBLISHER_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup yq@latest
        run: |
          if ! command -v yq &>/dev/null
          then
            mkdir -p /home/runner/.local/bin
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /home/runner/.local/bin/yq &&\
              chmod +x /home/runner/.local/bin/yq
          fi
      - name: Configure GIT
        run: |
          git config --global user.name "Platform Mesh Publisher[bot]"
          git config --global user.email "platformmesh@gmail.com"
      - name: Validate inputs
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          if ! [[ "${INPUT_CHART}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid chart name"
            exit 1
          fi
          if ! [[ "${INPUT_APP_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid appVersion format"
            exit 1
          fi
      - name: Update appVersion in Chart.yaml
        id: bump
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          set -euo pipefail
          chart_file="charts/${INPUT_CHART}/Chart.yaml"
          bash hack/bump-chart-version.sh "$chart_file" "${INPUT_APP_VERSION}"

          if git diff --quiet -- "$chart_file"; then
            echo "Chart.yaml unchanged; nothing to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_chart_version=$(yq '.version' "$chart_file")
          new_app_version=$(yq '.appVersion' "$chart_file" | tr -d '"')
          branch="bump/${INPUT_CHART}-${new_chart_version}"
          git checkout -b "$branch"
          git add "$chart_file"
          git commit -s -m "Set $new_chart_version / $new_app_version in $chart_file"
          {
            echo "changed=true"
            echo "branch=$branch"
            echo "title=Set $new_chart_version / $new_app_version in $chart_file"
          } >> "$GITHUB_OUTPUT"
      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.bump.outputs.branch }}
          TITLE: ${{ steps.bump.outputs.title }}
        run: |
          # Bot-owned, disposable bump branch: a plain force push is safe and
          # avoids the "stale info" rejection from --force-with-lease, which
          # needs a remote-tracking ref this fresh checkout never fetched.
          git push --force origin "$BRANCH"
          # Reuse an existing PR for this branch if one is already open.
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            # Create the PR and mark it for auto-merge.
            url=$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "Automated chart bump.")
            gh pr merge "$url" --auto
          else
            echo "PR already exists for $BRANCH; skipping create."
          fi


