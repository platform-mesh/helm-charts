name: Update chart parameters

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'The name of the helm chart'
        required: true
        default: ''
      appVersion:
        description: 'The version tag of the docker image'
        required: true
        default: '0.0.0'

permissions:
  contents: read

jobs:
  version-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "1415820"
          private-key: ${{ secrets.PM_PUBLISHER_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup yq@latest
        run: |
          if ! command -v yq &>/dev/null
          then
            mkdir -p /home/runner/.local/bin
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /home/runner/.local/bin/yq &&\
              chmod +x /home/runner/.local/bin/yq
          fi
      - name: Configure GIT
        run: |
          git config --global user.name "Platform Mesh Publisher"
          git config --global user.email "platformmesh@gmail.com"
      - name: Validate inputs
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          if ! [[ "${INPUT_CHART}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid chart name"
            exit 1
          fi
          if ! [[ "${INPUT_APP_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid appVersion format"
            exit 1
          fi
      - name: Update appVersion in Chart.yaml
        env:
          INPUT_CHART: ${{ inputs.chart }}
          INPUT_APP_VERSION: ${{ inputs.appVersion }}
        run: |
          set -euo pipefail
          chart_file="charts/${INPUT_CHART}/Chart.yaml"
          bash hack/bump-chart-version.sh "$chart_file" "${INPUT_APP_VERSION}"

          if git diff --quiet -- "$chart_file"; then
            echo "Chart.yaml unchanged; nothing to commit"
            exit 0
          fi

          new_chart_version=$(yq '.version' "$chart_file")
          new_app_version=$(yq '.appVersion' "$chart_file" | tr -d '"')
          git add "$chart_file"
          git commit -m "Set $new_chart_version / $new_app_version in $chart_file"
      - name: Git push
        run: |
          git push origin main
          echo "Pushed changes to main"
          git show HEAD


