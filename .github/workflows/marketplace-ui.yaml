name: Build marketplace-ui Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/marketplace-ui/**'
      - '.github/workflows/marketplace-ui.yaml'
      - '.ocm/component-constructor-chart-only.yaml'

permissions:
  contents: read

jobs:
  pipeline:
    concurrency:
      group: marketplace-ui-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/pipeline-chart.yml
    permissions:
      contents: write
      packages: write
    with:
      chartFolder: charts
      chartName: marketplace-ui
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
      chartOnly: true
    secrets: inherit

