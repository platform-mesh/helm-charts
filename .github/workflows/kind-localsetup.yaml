# NOTE: Test steps are mirrored in nightly-local-setup.yaml (scheduled workflow).
# Keep both files in sync when changing setup or test steps.
name: test-local-setup
permissions:
  contents: read
on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  checkout-and-detect-changes:
    runs-on: ubuntu-latest
    outputs:
      local_setup_changed: ${{ steps.local_setup.outputs.changed }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Did relevant paths change?
        id: local_setup
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
        run: |
          base="${BASE_REF#refs/heads/}"
          if
            git diff --quiet "origin/${base}" -- \
              charts \
              local-setup \
              .ocm \
              Taskfile.yaml \
              hack/ocm \
              .github/workflows/kind-localsetup.yaml \
              .github/workflows/nightly-local-setup.yaml \
              .github/workflows/pipeline-chart.yml \
              .github/workflows/ocm-aggregator.yaml \
              .github/workflows/ocm-service-component.yaml \
              ':(exclude)**/*.md' \
              ':(exclude)**/README.md.gotmpl'
          then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  kind-localsetup-skip:
    needs: checkout-and-detect-changes
    if: needs.checkout-and-detect-changes.outputs.local_setup_changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip — local-setup unchanged
        run: echo "local-setup unchanged, skipping kind-localsetup"

  kind-localsetup-run:
    needs: checkout-and-detect-changes
    if: needs.checkout-and-detect-changes.outputs.local_setup_changed == 'true'
    runs-on: ubuntu-latest-large

    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install the gh cli
        uses: ksivamuthu/actions-setup-gh-cli@c78dbed4be2f8d6133a14a9a597ee12fd4ed5c93 # v3
        with:
          version: 2.24.3
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.44.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install kubectl kcp plugins
        run: |
          set -e
          ( set -x; cd "$(mktemp -d)" && curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/krew-linux_amd64.tar.gz" && tar zxvf krew-linux_amd64.tar.gz && KREW_ROOT="$HOME/.krew" ./krew-linux_amd64 install krew )
          echo "$HOME/.krew/bin" >> $GITHUB_PATH
          export PATH="$HOME/.krew/bin:$PATH"
          kubectl krew index add kcp-dev https://github.com/kcp-dev/krew-index.git
          kubectl krew install kcp-dev/kcp
          kubectl krew install kcp-dev/ws
          kubectl krew install kcp-dev/create-workspace
          kubectl krew install oidc-login
      - name: Resolve third-party OCM versions
        id: ocm-versions
        run: local-setup/scripts/ocm-resolve-thirdparty-versions.sh
      - name: Cache expensive OCM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ocm/cache/
          key: ocm-thirdparty

      - name: Run local-setup with sharded example data
        run: |
          task local-setup:concurrent:example-data
      - name: Upload runtime artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: runtime-artifacts
          path: |
            runtime-artifacts/
          retention-days: 5

      - name: Setup Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'local-setup/e2e'

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('local-setup/e2e/package-lock.json') }}

      - name: Run e2e tests
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          task test:portal-e2e:video

      - name: Upload Playwright artefacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-artifacts
          path: |
            local-setup/e2e/test-results/
            local-setup/e2e/*.png
          retention-days: 5

  kind-localsetup:
    if: always()
    needs: [kind-localsetup-skip, kind-localsetup-run]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.kind-localsetup-run.result }}" == "failure" || "${{ needs.kind-localsetup-run.result }}" == "cancelled" ]]; then
            exit 1
          fi
