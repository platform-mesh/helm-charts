permissions:
  contents: write
  packages: write

name: Build virtual-workspaces Workflow
on:
  push:
    paths:
      - 'charts/virtual-workspaces/**'
      - '.github/workflows/virtual-workspaces.yaml'
      - '.ocm/component-constructor-chart-only.yaml'
  pull_request:
    paths:
      - 'charts/virtual-workspaces/**'
      - '.github/workflows/virtual-workspaces.yaml'

jobs:
  pipeline:
    concurrency:
      group: virtual-workspaces-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/pipeline-chart.yml
    with:
      chartFolder: charts
      chartName: virtual-workspaces
      additionalTestFilesCommand: ''
      chartRepos: 'bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts'
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
      chartOnly: true
    secrets: inherit

