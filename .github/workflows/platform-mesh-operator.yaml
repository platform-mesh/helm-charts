name: Build platform-mesh-operator Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/platform-mesh-operator/**'
      - '.github/workflows/platform-mesh-operator.yaml'
      - '.ocm/component-constructor-chart-only.yaml'
      - 'rgd/platform-mesh-operator-rgd.yaml'

permissions:
  contents: read

jobs:
  pipeline:
    concurrency:
      group: platform-mesh-operator-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/pipeline-chart.yml
    permissions:
      contents: write
      packages: write
    with:
      chartFolder: charts
      chartName: platform-mesh-operator
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
      chartOnly: true
    secrets: inherit
