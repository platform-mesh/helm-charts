permissions:
  contents: write
  packages: write

name: Build kubernetes-graphql-gateway Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/kubernetes-graphql-gateway/**'
      - '.github/workflows/kubernetes-graphql-gateway.yaml'
      - '.ocm/component-constructor-chart-only.yaml'

jobs:
  pipeline:
    concurrency:
      group: kubernetes-graphql-gateway-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/pipeline-chart.yml
    with:
      chartFolder: charts
      chartName: kubernetes-graphql-gateway
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
      chartOnly: true
    secrets: inherit

