name: Build example-httpbin-operator Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/example-httpbin-operator/**'
      - '.github/workflows/example-httpbin-operator.yaml'
      - '.ocm/component-constructor-example-httpbin-operator.yaml'
  pull_request:
    paths:
      - 'charts/example-httpbin-operator/**'
      - '.github/workflows/example-httpbin-operator.yaml'

permissions:
  contents: write
  packages: write

jobs:
  pipeline:
    concurrency:
      group: example-httpbin-operator-${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-chart.yml@c4423ef1896f1c154b2d12052992a23add16033c # main
    with:
      chartFolder: charts
      chartName: example-httpbin-operator
      additionalTestFilesCommand: ''
      chartRepos: 'bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts'
      componentConstructorFile: .ocm/component-constructor-example-httpbin-operator.yaml
    secrets: inherit


