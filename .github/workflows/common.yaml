name: Build common Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/common/**'
      - '.github/workflows/common.yaml'

permissions:
  contents: read

concurrency:
  group: common-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/pipeline-chart.yml
    permissions:
      contents: write
      packages: write
    with:
      chartFolder: charts
      chartName: common
      disableOCM: true
    secrets: inherit
