name: Build portal Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/portal/**'
      - '.github/workflows/portal.yaml'
      - '.ocm/component-constructor.yaml'
  pull_request:
    paths:
      - 'charts/portal/**'
      - '.github/workflows/portal.yaml'

permissions:
  contents: write
  packages: write
jobs:
  pipeline:
    concurrency:
      group: portal-${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-chart.yml@be477afc04260ab8af16c4a2b7574bc6687b2cbd # main
    with:
      chartFolder: charts
      chartName: portal
      additionalTestFilesCommand: ''
      chartRepos: 'bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts'
    secrets: inherit
