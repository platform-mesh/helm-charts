name: Build portal Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/portal/**'
      - '.github/workflows/portal.yaml'
      - '.ocm/component-constructor-chart-only.yaml'
  pull_request:
    paths:
      - 'charts/portal/**'
      - '.github/workflows/portal.yaml'

permissions:
  contents: write
  packages: write
jobs:
  pipeline:
    concurrency:
      group: portal-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/pipeline-chart.yml
    with:
      chartFolder: charts
      chartName: portal
      additionalTestFilesCommand: ''
      chartRepos: 'bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts'
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
      chartOnly: true
    secrets: inherit
