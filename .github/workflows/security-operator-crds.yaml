permissions:
  contents: write
  packages: write

name: Build security-operator-crds Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'charts/security-operator-crds/**'
      - '.github/workflows/security-operator-crds.yaml'
      - '.ocm/component-constructor-chart-only.yaml'
  pull_request:
    paths:
      - 'charts/security-operator-crds/**'
      - '.github/workflows/security-operator-crds.yaml'

jobs:
  pipeline:
    concurrency:
      group: security-operator-crds-${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-chart.yml@c4423ef1896f1c154b2d12052992a23add16033c # main
    with:
      chartFolder: charts
      chartName: security-operator-crds
      additionalTestFilesCommand: ''
      chartRepos: 'bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts'
      componentConstructorFile: .ocm/component-constructor-chart-only.yaml
    secrets: inherit


