{{- $noJson := include "common.getKeyValue" (dict "Values" .Values "key" "log.noJson") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.entity.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "common.entity.name" . }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.deployment.maxSurge }}
      maxUnavailable: {{ .Values.deployment.maxUnavailable }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: {{ include "common.entity.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "common.entity.name" . }}
        version: "{{ .Chart.AppVersion }}"
        {{- if eq .Values.schemaHandler.type "file" }}
        schema-handler-group: {{ include "common.entity.name" . }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "common.entity.name" . }}
      {{- include "common.imagePullSecret" . | nindent 6 }}
      {{- include "common.hostAliases" . | nindent 6 }}
      {{- if eq .Values.schemaHandler.type "file" }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  schema-handler-group: {{ include "common.entity.name" . }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
      - name: gateway
        image: {{ include "common.image" . }}
        {{- include "common.imagePullPolicy" . | nindent 8 }}
        {{- with .Values.gateway.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- include "common.container.securityContext" . | nindent 8 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.health.liveness.path }}
            port: {{ .Values.gateway.healthCheck.port }}
          failureThreshold: {{ .Values.health.liveness.failureThreshold }}
          periodSeconds: {{ .Values.health.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.health.readiness.path }}
            port: {{ .Values.gateway.healthCheck.port }}
          initialDelaySeconds: {{ .Values.health.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.health.readiness.periodSeconds }}
        startupProbe:
          httpGet:
            path: {{ .Values.health.startup.path }}
            port: {{ .Values.gateway.healthCheck.port }}
          failureThreshold: {{ .Values.health.startup.failureThreshold }}
          periodSeconds: {{ .Values.health.periodSeconds }}
        args:
        - gateway
        - --schema-handler={{ .Values.schemaHandler.type }}
        {{- if eq .Values.schemaHandler.type "grpc" }}
        - --grpc-listener-address={{ include "common.entity.name" . }}-listener.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.listener.grpcPort }}
        {{- else if eq .Values.schemaHandler.type "file" }}
        - --schemas-dir={{ .Values.schemaHandler.schemasDir }}
        {{- end }}
        {{- include "common.collectorArgs" . | nindent 8 }}
        {{- with .Values.gateway.extraArgs }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq $noJson "true" }}
        - --no-json
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.gateway.metricsPort }}
          protocol: TCP
        - name: health-port
          containerPort: {{ .Values.gateway.healthCheck.port }}
          protocol: TCP
        - name: service-port
          containerPort: {{ .Values.gateway.port }}
          protocol: TCP
        env:
        {{- if .Values.kubeConfig.enabled }}
        - name: KUBECONFIG
          value: {{ .Values.kubeConfig.path }}
        {{- end }}
        volumeMounts:
          - name: schemas-volume
            mountPath: {{ .Values.schemaHandler.schemasDir }}
            {{- if eq .Values.schemaHandler.type "file" }}
            readOnly: true
            {{- end }}
          {{- if .Values.kubeConfig.enabled }}
          - name: kubeconfig-volume
            mountPath: /app/kubeconfig
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
      volumes:
        - name: schemas-volume
          {{- if eq .Values.schemaHandler.type "file" }}
          persistentVolumeClaim:
            claimName: {{ include "common.entity.name" . }}-schemas
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.schemaHandler.sharedVolume.size }}
          {{- end }}
        {{- if .Values.kubeConfig.enabled }}
        - name: kubeconfig-volume
          secret:
            secretName: {{ .Values.kubeConfig.secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
