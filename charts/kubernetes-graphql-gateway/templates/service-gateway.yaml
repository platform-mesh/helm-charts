kind: Service
apiVersion: v1
metadata:
  name: {{ include "common.entity.name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ include "common.entity.name" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
    {{- if ne (int .Values.gateway.healthCheck.port) (int .Values.gateway.port) }}
    - name: health
      protocol: TCP
      port: {{ .Values.gateway.healthCheck.port }}
      targetPort: {{ .Values.gateway.healthCheck.port }}
    {{- end }}
    {{- if ne (int .Values.gateway.metricsPort) (int .Values.gateway.port) }}
    - name: metrics
      protocol: TCP
      port: {{ .Values.gateway.metricsPort }}
      targetPort: {{ .Values.gateway.metricsPort }}
    {{- end }}
  type: ClusterIP
