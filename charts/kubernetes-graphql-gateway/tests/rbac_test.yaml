suite: Test the Template files
values:
- ../values.yaml
- ../test_values.yaml
release:
  name: platform-mesh
  namespace: platform-mesh-system
chart:
  appVersion: 1.0.0
templates:
  - clusterrole.yaml
  - clusterrolebinding.yaml
tests:
  - it: matches the Snapshot
    asserts:
    - matchSnapshot: {}
  - it: creates RBAC in multi mode even when kcp.enabled is true
    set:
      kcp.enabled: true
      listener.provider: multi
    asserts:
      - matchSnapshot: {}
  - it: does not create RBAC when rbac.enabled is false
    set:
      rbac.enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: does not create RBAC when rbac.enabled is false regardless of provider
    set:
      rbac.enabled: false
      kcp.enabled: false
      listener.provider: single
    asserts:
      - hasDocuments:
          count: 0
