suite: Test single kubeconfig secret
values:
- ../values.yaml
release:
  name: platform-mesh
  namespace: platform-mesh-system
chart:
  appVersion: 1.0.0
templates:
  - single-kubeconfig-secret.yaml
tests:
  - it: renders in-cluster kubeconfig secret by default
    asserts:
      - matchSnapshot: {}
  - it: does not render when createInClusterSecret is false
    set:
      singleKubeConfig.createInClusterSecret: false
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render when singleKubeConfig is disabled
    set:
      singleKubeConfig.enabled: false
    asserts:
      - hasDocuments:
          count: 0
