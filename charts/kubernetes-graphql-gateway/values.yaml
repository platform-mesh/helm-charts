rbac:
  enabled: true

crds:
  enabled: true

image:
  name: ghcr.io/platform-mesh/kubernetes-graphql-gateway
  pullPolicy: IfNotPresent

kcp:
  # -- Controls kcp-specific RBAC. Set to true when provider is "kcp" or "multi".
  enabled: true

# -- Schema handler type: "grpc" or "file"
schemaHandler:
  type: grpc
  # -- Directory path for schema files (used when type is "file")
  schemasDir: /app/schemas
  # -- Shared volume configuration (used when type is "file")
  sharedVolume:
    storageClassName: ""
    size: 500Mi
    accessMode: ReadWriteOnce

gateway:
  port: 8080
  healthCheck:
    enabled: true
    port: 8080
  metricsPort: 8081
  graphiql: true
  logLevel: trace
  shouldImpersonate: false
  introspectionAuthentication: true
  usernameClaim: email
  extraArgs: []

  resources:
    limits:
      memory: 1200Mi
    requests:
      cpu: 250m
      memory: 1000Mi

listener:
  port: 8090
  grpcPort: 50051
  # -- Multicluster runtime provider: "single", "kcp", or "multi" (default).
  # "single" watches only the local cluster.
  # "kcp" watches only kcp workspaces.
  # "multi" composes both kcp + single providers.
  provider: multi
  apiExportEndpointSliceName: core.platform-mesh.io
  workspaceSchemaKubeconfigOverride: ""
  # -- CEL expression that selects which resources trigger a reconcile
  anchorResourceExpression: 'true'
  # -- GroupVersionResource for the reconciler to watch
  reconcilerGvr: apibindings.v1alpha2.apis.kcp.io
  additionalPathAnnotationKey: kcp.io/path
  # -- (multi mode only) Comma-separated list of providers for the resource controller.
  # Valid values: "kcp", "single". Only valid when provider=multi.
  resourceControllerProviders: "kcp"
  # -- (multi mode only) Comma-separated list of providers for the ClusterAccess controller.
  # Valid values: "kcp", "single". Only valid when provider=multi.
  # Requires enableClusterAccessController=true.
  clusterAccessControllerProviders: "single"
  # -- Enable the ClusterAccess controller.
  enableClusterAccessController: true

  extraArgs: []
  healthCheck:
    enabled: false
    port: 3390
  metricsPort: 8091
  resources:
    limits:
      memory: 600Mi
    requests:
      cpu: 250m
      memory: 500Mi

deployment:
  maxUnavailable: 0
  maxSurge: 5
  revisionHistoryLimit: 3
  replicas: 1

sentry:
  environment: dev

kubeConfig:
  createSecret: false
  # -- Mounts an external kubeconfig (for kcp provider).
  # When provider is "kcp" or "multi", this provides the kcp kubeconfig.
  enabled: true
  secretName: "kcp-root-kubeconfig"
  path: /app/kubeconfig/kubeconfig

# -- Single-provider kubeconfig. Used when listener.provider=multi.
singleKubeConfig:
  # -- Auto-generate an in-cluster kubeconfig using the pod's service account.
  # Set to false if providing your own secret via secretName.
  createInClusterSecret: true
  enabled: true
  secretName: "single-kubeconfig"
  path: /app/single-kubeconfig/kubeconfig

extraVolumes: []
extraVolumeMounts: []

hostAliases:
  enabled: false

# Health check configuration shared by both pods
health:
  periodSeconds: 10
  readiness:
    path: "/readyz"
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: "/healthz"
    failureThreshold: 1
    periodSeconds: 10
  startup:
    path: "/readyz"
    failureThreshold: 30
    periodSeconds: 10

traefik:
  # -- toggle to enable traefik CORS filter in HTTPRoute
  enabled: true

gatewayApi:
  # -- configuration for the HTTPRoute resource
  httpRoute:
    enabled: true
    pathPrefix: /gateway/api/clusters/
    hostnames:
    - "portal.localhost"
    - "*.portal.localhost"
    parentRefs:
    - name: k8sapi-gateway
    # -- list of HTTPRoute filters (default: URLRewrite only, no CORS)
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /api/clusters/
          type: ReplacePrefixMatch
    # -- CORS filter referencing traefik middleware (used when traefik.enabled=true)
    corsFilters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: cors-header
