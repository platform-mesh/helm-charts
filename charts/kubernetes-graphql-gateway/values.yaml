crds:
  enabled: false

image:
  name: ghcr.io/platform-mesh/kubernetes-graphql-gateway
  pullPolicy: IfNotPresent

kcp:
  enabled: true
  apiExportEndpointSliceName: "core.platform-mesh.io"

# -- Schema handler type: "grpc" or "file"
schemaHandler:
  type: file
  # -- Directory path for schema files (used when type is "file")
  schemasDir: /app/schemas
  # -- Shared volume configuration (used when type is "file")
  sharedVolume:
    storageClassName: ""
    size: 500Mi
    accessMode: ReadWriteOnce

gateway:
  port: 8080
  healthCheck:
    enabled: true
    port: 8080
  metricsPort: 8081
  graphiql: true
  logLevel: trace
  shouldImpersonate: false
  introspectionAuthentication: true
  usernameClaim: email
  extraArgs: []

  resources:
    limits:
      memory: 1200Mi
    requests:
      cpu: 250m
      memory: 1000Mi

listener:
  apiExportName: kcp.io
  port: 8090
  grpcPort: 50051
  # -- Multicluster runtime provider: "kcp" or "kubernetes"
  multiclusterRuntimeProvider: kcp
  apiExportEndpointSliceName: core.platform-mesh.io
  workspaceSchemaKubeconfigOverride: ""
  # -- CEL expression for anchor resource matching
  anchorResource: 'object.metadata.name.startsWith("core.platform-mesh.io")'
  # -- GroupVersionResource for the reconciler to watch
  reconcilerGvr: apibindings.v1alpha2.apis.kcp.io
  # -- Additional annotation key for path resolution
  additionalPathAnnotationKey: kcp.io/path

  extraArgs: []
  healthCheck:
    enabled: false
    port: 3390
  metricsPort: 8091
  virtualWorkspacesConfig:
    enabled: false
    configMapName: "virtual-workspaces-config"
    path: "/app/config/virtual-workspaces.yaml"
    content:
      virtualWorkspaces: []
  resources:
    limits:
      memory: 600Mi
    requests:
      cpu: 250m
      memory: 500Mi

deployment:
  maxUnavailable: 0
  maxSurge: 5
  revisionHistoryLimit: 3
  replicas: 1

  resources:
    limits:
      memory: 1600Mi
    requests:
      cpu: 300m
      memory: 800Mi

sentry:
  environment: dev

kubeConfig:
  createSecret: false
  # -- Allows the mounting of an external kubeconfig. If the kubeconfig is set, it is expected that the service account, that is used, is not connected to this chart and the rbac resources will not be generated.
  enabled: false
  secretName: "kcp-root-kubeconfig"
  path: /app/kubeconfig/kubeconfig

rbac:
  # -- Enables RBAC rules for service accounts (get, list, watch on serviceaccounts and serviceaccounts/token). Uses namespace-scoped Roles when serviceAccounts list is provided.
  createServiceAccountRules: false
  # -- List of service accounts with name and namespace to allow access to. Creates a Role and RoleBinding per namespace.
  # @default -- []
  # Example:
  # serviceAccounts:
  #   - name: my-service-account
  #     namespace: my-namespace
  #   - name: another-sa
  #     namespace: another-namespace
  serviceAccounts: []

extraEnvs: []
extraVolumes: []
extraVolumeMounts: []

tracing:
  enabled: true

hostAliases:
  enabled: false

# Health check configuration shared by both pods
health:
  periodSeconds: 10
  readiness:
    path: "/readyz"
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: "/healthz"
    failureThreshold: 1
    periodSeconds: 10
  startup:
    path: "/readyz"
    failureThreshold: 30
    periodSeconds: 10

traefik:
  # -- toggle to enable traefik CORS filter in HTTPRoute
  enabled: true

gatewayApi:
  # -- configuration for the HTTPRoute resource
  httpRoute:
    enabled: true
    pathPrefix: /api/kubernetes-graphql-gateway/
    hostnames:
    - "portal.localhost"
    - "*.portal.localhost"
    parentRefs:
    - name: k8sapi-gateway
    # -- list of HTTPRoute filters (default: URLRewrite only, no CORS)
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /api/clusters/
          type: ReplacePrefixMatch
    # -- CORS filter referencing traefik middleware (used when traefik.enabled=true)
    corsFilters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: cors-header
