# -- Create the namespace if it doesn't exist (usually handled externally)
createNamespace: false

# ------------------------------------------------------------------------------
# OpenTelemetry Operator
# Manages the OTel Collector via CRDs
# https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-operator
# ------------------------------------------------------------------------------
opentelemetry-operator:
  # -- Enable the OpenTelemetry Operator
  enabled: true
  manager:
    collectorImage:
      # -- Use the contrib image which includes the prometheus receiver
      repository: otel/opentelemetry-collector-contrib

# ------------------------------------------------------------------------------
# Prometheus
# Metrics storage and query backend
# https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus
# ------------------------------------------------------------------------------
prometheus:
  # -- Enable Prometheus deployment
  enabled: true
  server:
    persistentVolume:
      # -- Disable persistence for local development
      enabled: false
    extraFlags:
      # -- Enable remote write receiver (required for OTel Collector to push metrics)
      - web.enable-remote-write-receiver
      # -- Enable lifecycle API (required for config reloader sidecar)
      - web.enable-lifecycle
    service:
      type: ClusterIP
  # -- Disable components not needed for this POC
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  kube-state-metrics:
    enabled: false

# ------------------------------------------------------------------------------
# OpenTelemetry Collector
# Scrapes metrics from targets and forwards to Prometheus
# ------------------------------------------------------------------------------
otelCollector:
  # -- Name of the OpenTelemetryCollector CR
  name: otel-gateway
  # -- Deployment mode (statefulset required for Target Allocator)
  mode: statefulset
  # -- Number of collector replicas
  replicas: 1
  config:
    # -- Batch processor timeout before sending metrics
    batchTimeout: 10s

# ------------------------------------------------------------------------------
# ServiceMonitors
# Define which services to scrape metrics from
# ------------------------------------------------------------------------------
serviceMonitors:
  # -- account-operator metrics scraping
  accountOperator:
    # -- Enable scraping account-operator
    enabled: true
    # -- Namespace where account-operator runs
    namespace: platform-mesh-system
    # -- Labels to select account-operator metrics service
    labels:
      app: account-operator
    # -- Name of the port exposing metrics
    port: metrics
    # -- Path to metrics endpoint
    path: /metrics

  # -- security-operator metrics scraping
  securityOperator:
    # -- Enable scraping security-operator
    enabled: true
    # -- Namespace where security-operator runs
    namespace: platform-mesh-system
    # -- Labels to select security-operator metrics service
    labels:
      app: security-operator
    # -- Name of the port exposing metrics
    port: metrics
    # -- Path to metrics endpoint
    path: /metrics

  # -- kcp (root shard) metrics scraping
  # Requires client certificate authentication
  kcp:
    # -- Enable scraping kcp
    enabled: true
    # -- Namespace where kcp runs
    namespace: platform-mesh-system
    # -- Labels to select kcp service
    labels:
      app.kubernetes.io/component: rootshard
      app.kubernetes.io/name: kcp
    # -- Name of the port exposing metrics (same as API port)
    port: https
    # -- Path to metrics endpoint (kcp-specific path)
    path: /clusters/root/metrics
    # -- Use HTTPS scheme
    scheme: https
    # -- Skip TLS certificate verification (required for self-signed certs)
    tlsInsecureSkipVerify: true
    # -- Name of the TLS secret containing client cert/key for authentication
    # This secret is created by the kcp-metrics-cert-job from the kubeconfig
    tlsSecretName: kcp-metrics-client-cert
    # -- Kubeconfig configuration for kcp authentication
    # The kcp-operator creates a kubeconfig with client certificates
    kubeconfig:
      # -- Name of the Kubeconfig CR to create
      name: metrics-viewer
      # -- Username embedded in the client certificate
      username: metrics-viewer
      # -- Groups embedded in the client certificate
      # system:monitoring grants read access to /clusters/root/metrics endpoints
      groups:
        - system:monitoring
      # -- Validity period of the client certificate
      validity: 8766h
      # -- Name of the secret where kcp-operator stores the kubeconfig
      secretName: kubeconfig-metrics-viewer

  # -- OpenFGA metrics scraping
  openfga:
    # -- Enable scraping OpenFGA
    enabled: true
    # -- Namespace where OpenFGA runs
    namespace: platform-mesh-system
    # -- Labels to select OpenFGA service
    labels:
      app.kubernetes.io/name: openfga
    # -- Name of the port exposing metrics
    port: metrics
    # -- Path to metrics endpoint
    path: /metrics
