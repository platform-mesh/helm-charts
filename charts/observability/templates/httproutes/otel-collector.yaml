{{- if .Values.httproutes.otelCollector.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "observability.fullname" . }}-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  {{- with .Values.httproutes.otelCollector.hostnames }}
  hostnames:
  {{- range . }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.httproutes.gatewayName }}
    {{- if .Values.httproutes.gatewayNamespace }}
    namespace: {{ .Values.httproutes.gatewayNamespace }}
    {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.httproutes.otelCollector.pathPrefix }}
    {{- with .Values.httproutes.otelCollector.filters }}
    filters:
    {{- toYaml . | nindent 4 }}
    {{- end }}
    backendRefs:
    - group: ""
      kind: Service
      name: {{ .Values.otelCollector.name }}-collector
      namespace: {{ .Release.Namespace }}
      port: {{ .Values.httproutes.otelCollector.port }}
{{- end }}
