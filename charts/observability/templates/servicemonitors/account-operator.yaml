{{- if .Values.serviceMonitors.accountOperator.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: account-operator
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.serviceMonitors.accountOperator.namespace }}
  selector:
    matchLabels:
      {{- toYaml .Values.serviceMonitors.accountOperator.labels | nindent 6 }}
  endpoints:
    - port: {{ .Values.serviceMonitors.accountOperator.port }}
      path: {{ .Values.serviceMonitors.accountOperator.path }}
{{- end }}
