# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Test the application manifests
release:
  name: infra
  namespace: platform-mesh-system
tests:
- it: match snapshots
  set:
    kcp:
      image:
        tag: 0.0.0
  asserts:
  - matchSnapshot: {}
- it: match snapshots w. hostAliases enabled
  set:
    kcp:
      frontProxy:
        clusterIP: "10.0.0.1"
    hostAliases:
      enabled: true
  asserts:
    - matchSnapshot: {}
- it: match snapshots w. kcp version
  set:
    kcp:
      image:
        tag: "v0.1.0"
  asserts:
    - matchSnapshot: {}
- it: match snapshots with mailpit enabled
  set:
    mailpit:
      enabled: true
  asserts:
  - matchSnapshot: {}
- it: Gateway API enabled
  set:
    gatewayApi:
      enabled: true
    cors:
      enabled: true
  asserts:
    - matchSnapshot: {}
- it: Istio disabled
  set:
    istio:
      enabled: false
  asserts:
    - matchSnapshot: {}
- it: Istio enabled
  set:
    istio:
      enabled: true
  asserts:
    - matchSnapshot: {}
- it: configure gateway TLS credential namespace
  templates:
    - gatewayapi/gateway.yaml
  set:
    gatewayApi:
      enabled: true
      listeners:
        - name: terminate
          hostname: portal.localhost
          port: 8443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: domain-certificate
                namespace: default2
  asserts:
  - equal:
      path: spec.listeners[0].tls.certificateRefs[0].namespace
      value: default2
- it: configure frontproxy resources
  templates:
    - kcp/front-proxy.yaml
  set:
    kcp:
      frontProxy:
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
  asserts:
  - matchSnapshot: {}
- it: configure rootshard resources
  templates:
    - kcp/root-shard.yaml
  set:
    kcp:
      rootShard:
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
  asserts:
  - matchSnapshot: {}
- it: configure etcd backup store
  templates:
    - kcp/root-shard.yaml
  set:
    kcp:
      etcd:
        backup:
          store:
            container: etcd-bucket
            prefix: etcd-test
            provider: S3
            endpointOverride: http://localstack.default:4566
            secretRef:
              name: etcd-backup-aws
  asserts:
  - documentIndex: 0
    equal:
      path: spec.backup.store
      value:
        container: etcd-bucket
        prefix: etcd-test
        provider: S3
        endpointOverride: http://localstack.default:4566
        secretRef:
          name: etcd-backup-aws
  - matchSnapshot: {}
- it: render additional shard with explicit hostname
  templates:
    - kcp/shards.yaml
  set:
    kcp:
      shards:
        - name: shard-1
          hostname: shard-1.kcp.localhost
          spec:
            replicas: 2
  asserts:
  - matchSnapshot: {}
- it: render additional shard with hostname fallback
  templates:
    - kcp/shards.yaml
  set:
    kcp:
      shards:
        - name: shard-2
  asserts:
  - contains:
      path: spec.hostnames
      content: shard-2.kcp.localhost
    documentIndex: 2
- it: render additional shard with etcd override
  templates:
    - kcp/shards.yaml
  set:
    kcp:
      shards:
        - name: shard-3
          etcd:
            replicas: 3
  asserts:
  - equal:
      path: spec.replicas
      value: 3
    documentIndex: 0
  - equal:
      path: metadata.name
      value: etcd-kcp-shard-3
    documentIndex: 0
- it: render additional shard with spec override
  templates:
    - kcp/shards.yaml
  set:
    kcp:
      shards:
        - name: shard-4
          spec:
            resources:
              limits:
                cpu: 2000m
                memory: 2Gi
  asserts:
  - equal:
      path: spec.resources
      value:
        limits:
          cpu: 2000m
          memory: 2Gi
    documentIndex: 1
