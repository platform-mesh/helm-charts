{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.dex.service.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dex
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - name: http
    port: {{ .Values.dex.service.port }}
    targetPort: http
    protocol: TCP
{{- end }}
