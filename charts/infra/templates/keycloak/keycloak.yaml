{{- if .Values.keycloak.operator.enabled }}
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.keycloak.operator.instances }}
  image: {{ .Values.keycloak.operator.image.repository }}:{{ .Values.keycloak.operator.image.tag | default .Chart.AppVersion }}
  db:
    vendor: postgres
    host: {{ .Values.keycloak.operator.db.host }}
    port: {{ .Values.keycloak.operator.db.port }}
    database: {{ .Values.keycloak.operator.db.database }}
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password
  http:
    httpEnabled: true
  ingress:
    enabled: false
  hostname:
    hostname: {{ .Values.keycloak.operator.hostname }}
    strict: false
    backchannelDynamic: true
  proxy:
    headers: xforwarded
  additionalOptions:
    - name: http-relative-path
      value: /keycloak
  bootstrapAdmin:
    user:
      secret: keycloak-admin
  unsupported:
    podTemplate:
      spec:
        containers:
          - imagePullPolicy: IfNotPresent
            {{- include "common.operatorHealthAndReadyness" (dict "Values" .Values.keycloak.operator) | nindent 12 }}
            resources:
              {{- toYaml .Values.keycloak.operator.resources | nindent 14 }}
{{- end }}
