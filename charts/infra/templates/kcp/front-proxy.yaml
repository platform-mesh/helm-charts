apiVersion: operator.kcp.io/v1alpha1
kind: FrontProxy
metadata:
  name: {{.Values.kcp.frontProxy.name }}
  namespace: {{ .Values.kcp.namespace | default "kcp-system" }}
spec:
  replicas: {{ .Values.kcp.frontProxy.replicas }}
  auth:
    serviceAccount:
      enabled: {{ .Values.kcp.auth.serviceAccounts.enabled }}
  {{- if .Values.kcp.oidc.enabled }}
    {{ with .Values.kcp.oidc }}
    oidc:
      enabled: true
      issuerURL: {{ .issuerUrl }}
      caFileRef:
        name: {{ .caFileRef.name }}
        key: {{ .caFileRef.key }}
      clientID: {{ .clientID }}
      groupsClaim: {{ .groupsClaim }}
      usernameClaim: {{ .usernameClaim }}
    {{- end }}
  {{- end }}
  {{ with .Values.kcp.image.tag }}
  image:
    tag: {{ .}}
  {{- end }}
  additionalPathMappings:
{{ toYaml .Values.kcp.frontProxy.additionalPathMappings | indent 4 }}
  external:
    # replace the hostname with the external DNS name for your kcp instance
    hostname: {{ .Values.kcp.external.hostname }}
    port: {{ .Values.kcp.external.port }}
  rootShard:
    ref:
      name: root
  serviceTemplate:
    spec:
      type: ClusterIP
  {{- with .Values.kcp.frontProxy.clusterIP }}
      clusterIP: {{ . }}
  {{- end }}
  {{- with .Values.kcp.frontProxy.port }}
      ports:
      - appProtocol: https
        name: https
        port: {{ . }}
        protocol: TCP
        targetPort: 6443
  {{- end }}
  {{- with .Values.kcp.frontProxy.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  certificateTemplates:
    server:
      spec:
        dnsNames:
          - {{ .Values.kcp.frontProxy.name }}-front-proxy
          - {{ .Values.kcp.frontProxy.name }}-front-proxy.{{ .Values.kcp.namespace | default "kcp-system" }}
          - {{ .Values.kcp.frontProxy.name }}-front-proxy.{{ .Values.kcp.namespace | default "kcp-system" }}.svc.cluster.local
          - {{ .Values.kcp.external.hostname }}
  deploymentTemplate:
    spec:
      template:
        spec:
          {{- include "common.hostAliases" $ | nindent 10 }}
  extraArgs:
{{ toYaml .Values.kcp.frontProxy.extraArgs | indent 4 }}
