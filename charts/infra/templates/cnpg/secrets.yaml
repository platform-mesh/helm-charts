{{- if .Values.cnpg.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-keycloak-user
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.cnpg.roles.keycloak.username | quote }}
  password: {{ .Values.cnpg.roles.keycloak.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-openfga-user
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.cnpg.roles.openfga.username | quote }}
  password: {{ .Values.cnpg.roles.openfga.password | quote }}
{{- end }}
