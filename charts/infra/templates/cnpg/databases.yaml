{{- if .Values.cnpg.enabled }}
{{- range .Values.cnpg.databases }}
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ .name }}-db
  namespace: {{ $.Release.Namespace }}
spec:
  name: {{ .name }}
  owner: {{ .owner }}
  cluster:
    name: {{ $.Values.cnpg.cluster.name }}
---
{{- end }}
{{- end }}
