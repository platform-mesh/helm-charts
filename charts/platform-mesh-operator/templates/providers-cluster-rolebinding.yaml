{{- if .Values.providers.enabled }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "common.entity.name" . }}-providers
subjects:
- kind: ServiceAccount
  name: {{ include "common.entity.name" . }}-providers
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "common.entity.name" . }}-providers
  apiGroup: rbac.authorization.k8s.io
{{- end }}
