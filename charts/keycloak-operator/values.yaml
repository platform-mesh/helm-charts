image:
  # -- The image registry
  registry: quay.io
  # -- The image repository path (without registry)
  repository: keycloak/keycloak-operator
  # -- The image digest (when set, overrides tag: registry/repository@digest)
  digest: ""
  # -- The image tag (defaults to appVersion)
  tag: "26.6.0"

keycloakImage:
  # -- The Keycloak image registry
  registry: ghcr.io
  # -- The Keycloak image repository path (without registry).
  repository: platform-mesh/custom-images/keycloak
  # -- The Keycloak image tag (defaults to appVersion)
  tag: "v26.6.0"
  # -- The Keycloak image digest (when set, overrides tag: registry/repository@digest)
  digest: "sha256:207cdc27e513bc7a6a6d2e429e1a9346dd62654c92573866c4a091b844f7b800"

# -- Namespace to watch for Keycloak CRs. Defaults to the release namespace.
watchNamespaces: ""

deployment:
  replicas: 1
  specTemplate:
    # -- Annotations for the pod template
    annotations: {}
    # -- Labels for the pod template
    labels: {}
  resources:
    limits:
      # -- Memory limit
      memory: "450Mi"
      # -- CPU limit
      cpu: "700m"
    requests:
      # -- CPU request
      cpu: "300m"
      # -- Memory request
      memory: "450Mi"
