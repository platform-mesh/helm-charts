image:
  # -- The image repository
  name: quay.io/keycloak/keycloak-operator
  # -- The image tag (defaults to appVersion)
  tag: ""

keycloakImage:
  # -- The Keycloak image repository
  repository: ghcr.io/platform-mesh/custom-images/keycloak
  # -- The Keycloak image tag (defaults to appVersion)
  tag: "latest"

# -- Namespace to watch for Keycloak CRs. Defaults to the release namespace.
watchNamespaces: ""

deployment:
  replicas: 1
  specTemplate:
    # -- Annotations for the pod template
    annotations: {}
    # -- Labels for the pod template
    labels: {}
  resources:
    limits:
      # -- Memory limit
      memoryOverride: "450Mi"
      # -- CPU limit
      cpuOverride: "700m"
    requests:
      # -- CPU request
      cpuOverride: "300m"
      # -- Memory request
      memoryOverride: "450Mi"
