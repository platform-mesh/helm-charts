image:
  name: ghcr.io/platform-mesh/marketplace-ui
  pullPolicy: IfNotPresent
  pullSecret: github

imagePullSecret: "github"

deployment:
  maxUnavailable: 0
  maxSurge: 5

port: 8080

health:
  port: 8080
  startup:
    path: /healthz
  readiness:
    path: /healthz


contentConfig:
  baseDomain: localhost:8000/ui/marketplace
  protocol: http

istio:
  enabled: true
  virtualService:
    hosts:
      - "*"
    matcher:
      match:
        - uri:
            exact: /ui/marketplace
        - uri:
            prefix: /ui/marketplace/

http:
  protocol: https

cors:
  # -- toggle to enable CORS support
  enabled: false

gatewayApi:
  enabled: false
  httpRoute:
    pathPrefix: /ui/marketplace
    parentRefs:
    - name: k8sapi-gateway
    corsFilters:
    - extensionRef:
        group: traefik.io
        kind: Middleware
        name: cors-header
      type: ExtensionRef

exposure:
  # -- hostnames to be used for exposure
  hostnames:
    - "portal.localhost"
    - "*.portal.localhost"
