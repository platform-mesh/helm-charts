version: '3'

vars:
  LOCAL_BIN: bin
  CHARTS:
    sh: "printf '%s' $(ls -d charts/*/ | paste -sd ',' -)"
  CHANGED_CHARTS:
    sh: "( git diff --name-only main..@ ; git diff --name-only ) | grep '^charts/' | cut -d/ -f1-2 | sort | uniq | paste -sd ',' -"
  PACKAGED_CHARTS:
    sh: "mkdir -p oci/ && ls oci/ | sed 's/^/oci\\//g' | paste -sd ',' -"
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  OCM_VERSION: 0.33.0
  COMPONENT_PRERELEASE_VERSION: "1.0.0"
  CUSTOM_LOCAL_COMPONENTS_CHART_PATHS:
    - account-operator: charts/account-operator
    - example-httpbin-operator: charts/example-httpbin-operator
    - extension-manager-operator: charts/extension-manager-operator
    - iam-service: charts/iam-service
    - iam-ui: charts/iam-ui
    - infra: charts/infra
    - kubernetes-graphql-gateway: charts/kubernetes-graphql-gateway
    - platform-mesh-operator: charts/platform-mesh-operator
    - portal: charts/portal
    - rebac-authz-webhook: charts/rebac-authz-webhook
    - security-operator: charts/security-operator
    - terminal-controller-manager: charts/terminal-controller-manager
    - virtual-workspaces: charts/virtual-workspaces
  COMPONENT_VERSION_FIX_DEPEDENCY_VERSIONS: []
    # - keycloak: 24.8.1
  CMD_SED:
    sh: |
      # Check if sed is GNU sed or BSD sed (GNU sed has --version, BSD sed doesn't)
      if sed --version >/dev/null 2>&1; then
        echo "sed -i"
      else
        echo "sed -i ''"
      fi

tasks:
  default:
    cmds:
      - task --list-all

  ## Setup
  setup:kube-lint:
    internal: true
    cmds:
      - mkdir -p $(pwd)/{{.LOCAL_BIN}}
      - test -s {{.LOCAL_BIN}}/kube-linter || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest
      - chmod +x $(pwd)/{{.LOCAL_BIN}}/kube-linter
  setup:helm-docs:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/helm-docs || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
  setup:mkcert:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/mkcert || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install filippo.io/mkcert@latest
      - export PATH=$(pwd)/{{.LOCAL_BIN}}:$PATH
  setup:ocm:
    internal: true
    cmds:
      - ./local-setup/scripts/ocm-setup.sh
  setup:mkbin:
    internal: true
    cmds:
      - mkdir -p $(pwd)/{{.LOCAL_BIN}}


  ## Development
  lint:
    deps: []
    cmds:
      - "ct lint --target-branch main --chart-dirs=charts --validate-maintainers=false --chart-repos=bitnami=https://charts.bitnami.com/bitnami,openfga=https://openfga.github.io/helm-charts"
  helmtest:
    cmds:
      - "for chart in $(echo {{.CHARTS}} | tr ',' ' '); do helm unittest $chart; done"
  helmtest-update:
    cmds:
      - "for chart in $(echo {{.CHARTS}} | tr ',' ' '); do helm unittest -u $chart; done"
  test:
    deps:
      - task: helmtest
  update-changed:
    deps:
      - task: docs
    cmds:
      - "for chart in $(echo {{.CHANGED_CHARTS}} | tr ',' ' '); do helm dependency update $chart && helm unittest -u $chart; done"
  update:
    deps:
      - task: docs
    cmds:
      - "for chart in $(echo {{.CHARTS}} | tr ',' ' '); do helm dependency update $chart; done"
  validate:
    cmds:
      - task: test
      - task: docs
      - task: update
      - task: lint
      - task: oci
  vulnerability:
    deps:
      - task: setup:kube-lint
    cmds:
      - "{{.LOCAL_BIN}}/kube-linter lint \"charts/\" --format \"plain\""
  docs:
    deps:
      - task: setup:helm-docs
    cmds:
      - "for chart in $(echo {{.CHARTS}} | tr ',' ' '); do {{.LOCAL_BIN}}/helm-docs --log-level=debug --chart-search-root $chart --template-files=../../docs-templates/header.md.gotmpl,README.md.gotmpl,../../docs-templates/footer.md.gotmpl --skip-version-footer=false; done"
  oci:
    cmds:
      - "rm oci/* || true"
      - task: helmpackage

  ocm:deploy:ociregistry:
    internal: true
    cmds:
      - |
        kind export kubeconfig -n platform-mesh
        # docs: https://github.com/twuni/docker-registry.helm
        helm repo add twuni https://twuni.github.io/docker-registry.helm || true
        helm repo update
        kubectl create ns registry || true
        helm upgrade --install oci-registry twuni/docker-registry -n registry --set service.port=443 --set tlsSecretName=domain-certificate --set image.repository=ghcr.io/distribution/distribution --set image.tag=3.0.0 --set ingress.enabled=false

        kubectl create secret generic domain-certificate -n registry \
          --from-file=tls.crt=./local-setup/scripts/certs/cert.crt \
          --from-file=tls.key=./local-setup/scripts/certs/cert.key \
          --from-file=ca.crt=./local-setup/scripts/certs/ca.crt \
          --type=kubernetes.io/tls --dry-run=client -oyaml | kubectl apply -f -

        kubectl wait --namespace registry \
          --for=condition=available deployment \
          --timeout=120s oci-registry-docker-registry

  ocm:build:custom-local-charts:
    deps:
      - task: setup:ocm
    cmds:
      - ./local-setup/scripts/ocm-build-local-charts.sh

  ocm:configure:tls:
    internal: true
    desc: Apply ocm-k8s-toolkit patch to support oci registry with self-signed certs
    cmds:
      - local-setup/scripts/configureOcmTls.sh

  ocm:build:component:
    aliases:
      - ocm:build
    cmds:
      - ./local-setup/scripts/ocm-build-component.sh

  ocm:deploy:transfer-pod:
    internal: true
    cmds:
      - |
        set -e
        echo "Transferring OCM transport archive to local registry from a pod..."
        kubectl delete pod ocm-transfer-pod --ignore-not-found=true || true
        kubectl run ocm-transfer-pod --image=ghcr.io/platform-mesh/images/ocmbuilder:pr-4 -- sleep infinity || true
        kubectl wait --namespace default --for=condition=Ready pod --timeout=480s ocm-transfer-pod
        kubectl exec -i ocm-transfer-pod -- mkdir -p .ocm

        # configure RootCA truststore on the pod
        kubectl exec -i ocm-transfer-pod -- openssl s_client -connect oci-registry-docker-registry.registry.svc.cluster.local:443 -showcerts </dev/null 2>/dev/null| openssl x509 -outform PEM > registry-ca.pem
        kubectl cp registry-ca.pem -n default ocm-transfer-pod:registry-ca.pem
        kubectl exec -i ocm-transfer-pod -- sudo cp registry-ca.pem /usr/local/share/ca-certificates/local-oci-registry_root_ca.crt
        kubectl exec -i ocm-transfer-pod -- sudo update-ca-certificates

  ocm:transfer:dir-to-local-oci:
    cmds:
      - cmd: kubectl exec -i ocm-transfer-pod -- ocm transfer ctf --overwrite .ocm/transport.ctf oci://oci-registry-docker-registry.registry.svc.cluster.local/platform-mesh
        ignore_error: true

  ocm:deploy:
    cmds:
      - task: ocm:deploy:ociregistry
      - task: ocm:deploy:transfer-pod
      - task: ocm:configure:tls

  ocm:kustomize:apply:
    aliases:
      - ocm:apply
    cmds:
      - kind export kubeconfig -n platform-mesh
      - |
        echo "Applying kustomize overlay to deploy platform-mesh, semver: {{ .COMPONENT_PRERELEASE_VERSION }}"
        yq -i '.spec.semver = "{{ .COMPONENT_PRERELEASE_VERSION }}"' local-setup/kustomize/overlays/ocm-prerelease/prerelease-component.yml

      - |
        kubectl apply -k local-setup/kustomize/overlays/ocm-prerelease
        echo "Applied kustomize overlay"
      - kubectl rollout restart deployment/ocm-k8s-toolkit-controller-manager -n ocm-system

  ocm:cleanup:
    cmds:
      - kind export kubeconfig -n platform-mesh
      - |
        rm registry-ca.pem
      - cmd: kubectl delete pod ocm-transfer-pod --ignore-not-found=true

  ocm:check-images:
    desc: Check which images are OCM-managed vs unmanaged on the cluster
    cmds:
      - ./local-setup/scripts/check-ocm-images.sh

  ocm:build-apply:iterate:
    cmds:
      - task: ocm:build:component
      - task: ocm:kustomize:apply

  ocm:update:constructor:
    desc: Prepare .ocm/component-constructor-prerelease.yaml from the local aggregate descriptor.
    cmds:
      - cp .ocm/component-constructor-aggregate.yaml .ocm/component-constructor-prerelease.yaml
      - sed 's/name:\ github.com\/platform-mesh\/platform-mesh/name:\ github.com\/platform-mesh\/prerelease/' .ocm/component-constructor-prerelease.yaml > .ocm/component-constructor-prerelease.yaml.tmp && mv .ocm/component-constructor-prerelease.yaml.tmp .ocm/component-constructor-prerelease.yaml

  # Internal task to run portal tests for a specific org/account
  test:portal-e2e:run:
    internal: true
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    cmds:
      - task: test:portal-e2e:marketplace-ui
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:httpbins
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:account-kubeconfig
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:authorization
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:deletion
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:setup:
    run: once
    internal: true
    dir: local-setup/e2e
    cmds:
      - npm ci
      - npx playwright install chromium ffmpeg

  test:portal-e2e:httpbins:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - ORG_NAME={{.ORG_NAME}} {{if .TEST_ACCOUNT_NAME}}TEST_ACCOUNT_NAME={{.TEST_ACCOUNT_NAME}}{{end}} npx playwright test portal-httpbins.test.ts {{if .HEADED}}--headed{{end}}

  test:portal-e2e:marketplace:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    cmds:
      - task: test:portal-e2e:marketplace-ui
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:marketplace-ui:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - ORG_NAME={{.ORG_NAME}} {{if .TEST_ACCOUNT_NAME}}TEST_ACCOUNT_NAME={{.TEST_ACCOUNT_NAME}}{{end}} npx playwright test portal-marketplace-ui.test.ts {{if .HEADED}}--headed{{end}}

  test:portal-e2e:account-kubeconfig:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - ORG_NAME={{.ORG_NAME}} {{if .TEST_ACCOUNT_NAME}}TEST_ACCOUNT_NAME={{.TEST_ACCOUNT_NAME}}{{end}} npx playwright test portal-account-kubeconfig.test.ts {{if .HEADED}}--headed{{end}}

  test:portal-e2e:authorization:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - ORG_NAME={{.ORG_NAME}} {{if .TEST_ACCOUNT_NAME}}TEST_ACCOUNT_NAME={{.TEST_ACCOUNT_NAME}}{{end}} npx playwright test portal-authorization.test.ts {{if .HEADED}}--headed{{end}}

  test:portal-e2e:headed:
    desc: Run portal e2e tests with browser visible
    vars:
      ORG_NAME: '{{.ORG_NAME | default ""}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
    cmds:
      - task: test:portal-e2e
        vars: { ORG_NAME: '{{.ORG_NAME}}', TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME}}', HEADED: 'true' }

  test:portal-e2e:video:
    desc: Run portal e2e tests with video recording (sharded, sequential)
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID | default (now | unixEpoch | printf "%.8s")}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - VIDEO=true TEST_RUN_ID={{.TEST_RUN_ID}} SHARDING_ORG_SHARD=root npx playwright test test-register-and-navigate.test.ts
      - VIDEO=true TEST_RUN_ID={{.TEST_RUN_ID}} SHARDING_ORG_SHARD=triton npx playwright test test-register-and-navigate.test.ts
      - VIDEO=true ORG_NAME=org-root-{{.TEST_RUN_ID}} TEST_ACCOUNT_NAME=acc-root-{{.TEST_RUN_ID}} npx playwright test portal-*.test.ts --workers=1
      - VIDEO=true ORG_NAME=org-triton-{{.TEST_RUN_ID}} TEST_ACCOUNT_NAME=acc-triton-{{.TEST_RUN_ID}} npx playwright test portal-*.test.ts --workers=1

  test:portal-e2e:deletion:
    vars:
      ORG_NAME: '{{.ORG_NAME | default "default"}}'
      TEST_ACCOUNT_NAME: '{{.TEST_ACCOUNT_NAME | default ""}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - ORG_NAME={{.ORG_NAME}} {{if .TEST_ACCOUNT_NAME}}TEST_ACCOUNT_NAME={{.TEST_ACCOUNT_NAME}}{{end}} npx playwright test portal-account-deletion.test.ts {{if .HEADED}}--headed{{end}}


  test:portal-e2e:
    desc: Run portal e2e tests with workspaces on different shards (2 orgs in parallel, 2 accounts each)
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID | default (now | unixEpoch | printf "%.8s")}}'
      HEADED: '{{.HEADED | default ""}}'
    deps:
      - task: test:portal-e2e:shard:root
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:shard:triton
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:shard:root:
    desc: Run portal e2e tests with org on root shard
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID | default (now | unixEpoch | printf "%.8s")}}'
      HEADED: '{{.HEADED | default ""}}'
    cmds:
      - task: test:portal-e2e:sharding-setup
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', SHARDING_ORG_SHARD: 'root', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:shard:root:accounts
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:shard:root:accounts:
    internal: true
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID}}'
      HEADED: '{{.HEADED | default ""}}'
    deps:
      - task: test:portal-e2e:run
        vars: { ORG_NAME: 'org-root-{{.TEST_RUN_ID}}', TEST_ACCOUNT_NAME: 'acc-triton-{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:run
        vars: { ORG_NAME: 'org-root-{{.TEST_RUN_ID}}', TEST_ACCOUNT_NAME: 'acc-root-{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:shard:triton:
    desc: Run portal e2e tests with org on triton shard
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID | default (now | unixEpoch | printf "%.8s")}}'
      HEADED: '{{.HEADED | default ""}}'
    cmds:
      - task: test:portal-e2e:sharding-setup
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', SHARDING_ORG_SHARD: 'triton', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:shard:triton:accounts
        vars: { TEST_RUN_ID: '{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:shard:triton:accounts:
    internal: true
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID}}'
      HEADED: '{{.HEADED | default ""}}'
    deps:
      - task: test:portal-e2e:run
        vars: { ORG_NAME: 'org-triton-{{.TEST_RUN_ID}}', TEST_ACCOUNT_NAME: 'acc-triton-{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }
      - task: test:portal-e2e:run
        vars: { ORG_NAME: 'org-triton-{{.TEST_RUN_ID}}', TEST_ACCOUNT_NAME: 'acc-root-{{.TEST_RUN_ID}}', HEADED: '{{.HEADED}}' }

  test:portal-e2e:sharding-setup:
    desc: Setup sharded org and accounts for e2e tests
    vars:
      TEST_RUN_ID: '{{.TEST_RUN_ID | default (now | unixEpoch | printf "%.8s")}}'
      SHARDING_ORG_SHARD: '{{.SHARDING_ORG_SHARD | default "triton"}}'
      HEADED: '{{.HEADED | default ""}}'
    deps: [test:portal-e2e:setup]
    dir: local-setup/e2e
    cmds:
      - TEST_RUN_ID={{.TEST_RUN_ID}} SHARDING_ORG_SHARD={{.SHARDING_ORG_SHARD}} npx playwright test test-register-and-navigate.test.ts {{if .HEADED}}--headed{{end}}

  test:backend-resources:
    cmds:
      - ./local-setup/scripts/check-backend-resources.sh

  test:local-setup:
    desc: Run backend resource checks and portal e2e tests
    cmds:
      - task: test:backend-resources
      - task: test:portal-e2e

  local-setup:base:
    internal: true
    deps:
      - task: setup:mkcert
    vars:
      SHARDED: '{{.SHARDED}}'
      FLAGS: '{{.FLAGS}}'
    cmds:
      - |
        if kind get clusters 2>/dev/null | grep -q "^platform-mesh$"; then
          read -r -p "Are you sure you want to delete the cluster? [y/N] " response && if [ "$response" != "y" ]; then echo "Aborted."; exit 1; fi
          kind delete cluster --name platform-mesh
        fi
        if kind get clusters 2>/dev/null | grep -q "^platform-mesh-infra$"; then
          read -r -p "Are you sure you want to delete the cluster? [y/N] " response && if [ "$response" != "y" ]; then echo "Aborted."; exit 1; fi
          kind delete cluster --name platform-mesh-infra
        fi
        ./local-setup/scripts/start.sh {{.SHARDED}} {{.FLAGS}}

  local-setup:base:iterate:
    internal: true
    deps:
      - task: setup:mkcert
    vars:
      SHARDED: '{{.SHARDED}}'
      FLAGS: '{{.FLAGS}}'
    cmds:
      - ./local-setup/scripts/start.sh {{.SHARDED}} {{.FLAGS}}

  local-setup:
    cmds:
      - task: local-setup:base
        vars: { SHARDED: "--sharded", FLAGS: "{{.FLAGS}}" }

  local-setup:iterate:
    cmds:
      - task: local-setup:base:iterate
        vars: { SHARDED: "--sharded", FLAGS: "{{.FLAGS}}" }
  # Convenience aliases with common flag combinations

  local-setup:example-data:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--example-data"}

  local-setup:example-data:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--example-data"}

  local-setup:concurrent:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--concurrent"}

  local-setup:concurrent:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--concurrent"}

  local-setup:concurrent:example-data:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--concurrent --example-data"}

  local-setup:concurrent:example-data:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--concurrent --example-data"}

  local-setup:remote:fluxcd:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--remote --deployment-tech=fluxcd"}

  local-setup:remote:fluxcd:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--remote --deployment-tech=fluxcd"}

  local-setup:remote:argocd:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--remote --deployment-tech=argocd"}

  local-setup:remote:argocd:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--remote --deployment-tech=argocd"}

  local-setup:remote:fluxcd:example-data:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--remote --deployment-tech=fluxcd --example-data"}

  local-setup:remote:fluxcd:example-data:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--remote --deployment-tech=fluxcd --example-data"}

  local-setup:remote:argocd:example-data:
    cmds:
      - task: local-setup
        vars: {FLAGS: "--remote --deployment-tech=argocd --example-data"}

  local-setup:remote:argocd:example-data:iterate:
    cmds:
      - task: local-setup:iterate
        vars: {FLAGS: "--remote --deployment-tech=argocd --example-data"}

  local-setup:single-shard:
    cmds:
      - task: local-setup:base
        vars: { SHARDED: "", FLAGS: "{{.FLAGS}}" }

  local-setup:single-shard:iterate:
    cmds:
      - task: local-setup:base:iterate
        vars: { SHARDED: "", FLAGS: "{{.FLAGS}}" }

  local-setup:single-shard:example-data:
    cmds:
      - task: local-setup:single-shard
        vars: {FLAGS: "--example-data"}

  local-setup:single-shard:example-data:iterate:
    cmds:
      - task: local-setup:single-shard:iterate
        vars: {FLAGS: "--example-data"}

  local-setup:single-shard:concurrent:
    cmds:
      - task: local-setup:single-shard
        vars: {FLAGS: "--concurrent"}

  local-setup:single-shard:concurrent:iterate:
    cmds:
      - task: local-setup:single-shard:iterate
        vars: {FLAGS: "--concurrent"}

  local-setup:single-shard:concurrent:example-data:
    cmds:
      - task: local-setup:single-shard
        vars: {FLAGS: "--concurrent --example-data"}

  local-setup:single-shard:concurrent:example-data:iterate:
    cmds:
      - task: local-setup:single-shard:iterate
        vars: {FLAGS: "--concurrent --example-data"}

  local-setup:single-shard:remote:fluxcd:
    cmds:
      - task: local-setup:single-shard
        vars: {FLAGS: "--remote --deployment-tech=fluxcd"}

  local-setup:single-shard:remote:fluxcd:iterate:
    cmds:
